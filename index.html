
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
	const sceneEl = document.querySelector('a-scene');
	const capyTarget = document.querySelector("#target2");
	const capyVid = document.querySelector("#capy-mp4");
	  let arSystem;
	  sceneEl.addEventListener('loaded', function () {
		  arSystem = sceneEl.systems["mindar-face-system"];
		});

	capyTarget.addEventListener("targetFound", () => {
          capyVid.volume = globalVolume;
          capyVid.play();
        });

	      capyTarget.addEventListener("targetLost", () => capyVid.pause());
	      
	const switchCameraButton = document.querySelector("#example-switch-camera-button");

	switchCameraButton.addEventListener('click', () => {
	  arSystem.switchCamera();
	});
      });
    </script>
    <style>
      body {
        margin: 0;
      }
      .example-container {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
      }
      #example-control-overlay {
	position: fixed;
	top: 0;
	right: 0;
	background: none;
	height: 30px;
	z-index: 2;
      }
      #example-control-overlay >div {
	position: absolute;
	right: 0;
      }
    </style>
  </head>
  <body>
    <div class="example-container">
      <div id="example-control-overlay" class="overlay">
	<div>
	  <button id="example-switch-camera-button">Switch Camera</button>
	</div>
      </div>
      <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
        <video id="capy-mp4" src="capybara.mp4"></video>
        <a-asset-item id="porscheModel" src="porsche.glb"></a-asset-item>
      </a-assets>
    <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
        </a-assets>
  
        <a-camera active="false" position="0 0 0"></a-camera>
        <a-entity mindar-face-target="anchorIndex: 168">
    <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.01 0.01 0.01" src="#glassesModel"></a-gltf-model>
        </a-entity>
      </a-scene>

	<a-entity mindar-image-target="targetIndex: 2" id="target2">
        <a-video id="capybara-vid-link" src="#capy-mp4" autoplay="false" rotation="0 0 0" width="1" height="0.5625" scale="2 2 2" position="0 0 0"></a-video>
      </a-entity>
    </div>
  </body>
</html>
